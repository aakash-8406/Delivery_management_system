---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-app
  namespace: smartqueue
  labels:
    app: restaurant-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: restaurant-app
    spec:
      containers:
        - name: restaurant-app
          image: DOCKERHUB_USER/smartqueue-restaurant:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

# Service
apiVersion: v1
kind: Service
metadata:
  name: restaurant-app-svc
  namespace: smartqueue
spec:
  type: NodePort
  selector:
    app: restaurant-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30175
